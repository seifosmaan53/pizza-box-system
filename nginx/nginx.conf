worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    # ─────────────────────────────────────────────
    # Security: Hide server version
    # ─────────────────────────────────────────────
    server_tokens off;

    # ─────────────────────────────────────────────
    # Timeouts (prevent slowloris attacks)
    # ─────────────────────────────────────────────
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     65s;
    send_timeout          10s;

    # ─────────────────────────────────────────────
    # Body size limit
    # ─────────────────────────────────────────────
    client_max_body_size 10m;

    # ─────────────────────────────────────────────
    # Rate limiting zones
    # ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # ─────────────────────────────────────────────
    # Connection limiting
    # ─────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';

    access_log /var/log/nginx/access.log main;

    # ─────────────────────────────────────────────
    # Gzip compression
    # ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ─────────────────────────────────────────────
    # Redirect HTTP → HTTPS
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────
    # HTTPS server
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── SSL Configuration ──
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ── Security Headers ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # ── Connection limits ──
        limit_conn addr 100;

        # ── AI chat SSE streaming (must be before general /api/) ──
        location /api/ai/chat {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://server:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Critical for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # Longer timeouts for AI streaming responses
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;

            # Hide backend headers
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # ── API proxy ──
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://server:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Hide backend headers
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
            proxy_send_timeout    10s;
        }

        # ── Login endpoint (stricter rate limit) ──
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;

            proxy_pass http://server:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Powered-By;
        }

        # ── Health check (no rate limit) ──
        location /health {
            proxy_pass http://server:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Frontend (static files) ──
        location / {
            proxy_pass http://client:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://client:80;
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Block common attack paths ──
        location ~ /\. {
            deny all;
            return 404;
        }
        location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi)$ {
            deny all;
            return 404;
        }
        location ~ /wp-(admin|login|content|includes) {
            deny all;
            return 404;
        }
    }
}
