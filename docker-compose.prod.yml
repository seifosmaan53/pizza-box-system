services:
  postgres:
    image: postgres:15-alpine
    container_name: pizzabox_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pizzabox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: pizzabox_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - internal

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: pizzabox_server
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/pizzabox
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
    volumes:
      - ./server/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - internal
      - external

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: pizzabox_client
    restart: always
    networks:
      - external

  nginx:
    image: nginx:alpine
    container_name: pizzabox_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - server
      - client
    restart: always
    networks:
      - external

  # Automated daily database backup at 2 AM UTC
  backup:
    image: postgres:15-alpine
    container_name: pizzabox_backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "
        while true; do
          echo \"[\$$(date -Iseconds)] Running scheduled backup...\";
          pg_dump -h postgres -U postgres pizzabox | gzip > /backups/pizzabox-\$$(date +%Y%m%d-%H%M%S).sql.gz;
          find /backups -name 'pizzabox-*.sql.gz' -mtime +30 -delete;
          echo \"[\$$(date -Iseconds)] Backup complete. Sleeping 24h...\";
          sleep 86400;
        done
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - internal

networks:
  internal:
  external:

volumes:
  postgres_data:
  redis_data:
